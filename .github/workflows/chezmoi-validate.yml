name: chezmoi-validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-latest
    # Historical runs take 7-9 minutes (brew bundle dominates); leave headroom
    # for the linters added to the Brewfile and runner variance.
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install chezmoi
        run: brew install chezmoi

      - name: Seed chezmoi config
        run: |
          mkdir -p ~/.config/chezmoi
          cat > ~/.config/chezmoi/chezmoi.toml << 'EOF'
          [data]
            name = "test"
            email = "test@example.com"
            is_work = false
            company = ""
            work_email = ""
          EOF

      - name: Initialize and apply
        run: |
          chezmoi init --source="$GITHUB_WORKSPACE" --no-tty
          chezmoi apply --source="$GITHUB_WORKSPACE" --no-tty --force

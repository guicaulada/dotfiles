name: renovate

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions: {}

# Never run two Renovate instances concurrently; let an in-flight run finish
# rather than canceling it mid-PR-creation.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.RENOVATE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          # Least-privilege token scope for Renovate (not blanket App perms).
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write
          permission-issues: write
          permission-statuses: write
          permission-checks: read
          permission-vulnerability-alerts: read

      - uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM_COMMIT: enabled

# Terminal support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB:usstyle:extkeys:clipboard"
set -as terminal-features ",xterm-256color:RGB:usstyle:extkeys:clipboard"
set -g extended-keys on
set -g extended-keys-format csi-u

# General
set -g mouse on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -s copy-command 'pbcopy'
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Window titles (pass through to Ghostty tabs)
set -g set-titles on
set -g set-titles-string "#{b:pane_current_path}"

# No UI
set -g status off

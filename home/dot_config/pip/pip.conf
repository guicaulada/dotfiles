[global]
# Refuse pip installs outside a virtualenv so nothing pollutes the system Python and
# `pip install <malicious-pkg>` cannot run setup.py on the user account by accident.
require-virtualenv = true

# Suppress pip's self-update nag; updating pip itself is a global, security-relevant action.
disable-pip-version-check = true

# Bail out on warnings during dependency resolution rather than silently picking a yanked
# or platform-mismatched wheel.
no-warn-script-location = false

aliases:
  shell:
    cat: "bat --paging=never"
    cheatsh: "navi --print --cheatsh"
    ll: "eza -la --icons=auto --git"
    ls: "eza --icons=auto"
    lt: "eza --tree --icons=auto --level=2"
    top: btop
    vim: nvim
  tmux:
    ta: "tmux attach -t"
    td: "tmux detach"
    tk: "tmux kill-session -t"
    tl: "tmux list-sessions"
    tn: "tmux new-session -s"
    ts: "tmux switch-client -t"

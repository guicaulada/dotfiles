# macOS-specific security patterns
bashToolPatterns:
  # ---------------------------------------------------------------------------
  # macOS SERVICE/PREFERENCES DESTRUCTION
  # ---------------------------------------------------------------------------
  - pattern: '\blaunchctl{flags}(remove|bootout)\b'
    reason: launchctl remove/bootout (disables macOS services)

  - pattern: '\bdefaults{flags}delete\b'
    reason: defaults delete (removes macOS preferences)

  - pattern: '\bsecurity{flags}delete-(keychain|generic-password|internet-password)\b'
    reason: security delete (deletes macOS keychain or keychain entry)

  - pattern: '\bgpg\s+--delete-(key|secret-key|secret-and-public-key)\b'
    reason: gpg key deletion

  - pattern: '\blaunchctl{flags}unload\b'
    reason: launchctl unload (stops macOS service)

  - pattern: '\bdiskutil{flags}apfs\s+deleteVolume\b'
    reason: diskutil APFS volume deletion

  # ---------------------------------------------------------------------------
  # macOS SYSTEM SECURITY
  # ---------------------------------------------------------------------------
  - pattern: '\bcsrutil\b'
    reason: csrutil (System Integrity Protection control)

  - pattern: '\bspctl\s+--master-disable\b'
    reason: spctl --master-disable (disables Gatekeeper)

  - pattern: '\bdscl\b.*\b(create|delete|merge|change)\b'
    reason: dscl directory services modification

  - pattern: '\bxattr\s+-d\b.*com\.apple\.quarantine'
    reason: xattr removes quarantine (bypasses Gatekeeper)

  - pattern: '\bnvram\b'
    reason: nvram (modifies firmware variables - can brick system)

  - pattern: '\bbless\b'
    reason: bless (changes boot volume - can make system unbootable)

  - pattern: '\bfdesetup\s+(destroy|remove|disable)\b'
    reason: fdesetup destroy/remove/disable (disables FileVault encryption)

  - pattern: '\bkextunload\b'
    reason: kextunload (unloads kernel extension - can crash system)

  # ---------------------------------------------------------------------------
  # macOS REQUIRING CONFIRMATION
  # ---------------------------------------------------------------------------
  - pattern: '\bdefaults{flags}write\b'
    reason: Modifies macOS preferences

  - pattern: '\bnetworksetup\b'
    reason: Modifies macOS network configuration

  - pattern: '\bscutil\s+--set\b'
    reason: Modifies macOS system configuration

  - pattern: '\bpmset\b'
    reason: Modifies macOS power management settings

  - pattern: '\blaunchctl{flags}(load|bootstrap|submit)\b'
    reason: Loads macOS service

  - pattern: '\bdiskutil{flags}(unmount|unmountDisk|mount|mountDisk)\b'
    reason: Mounts/unmounts macOS disk

  - pattern: '\bsystemsetup\b'
    reason: Modifies macOS system settings (timezone, sleep, remote login)

  - pattern: '\bsoftwareupdate\s+(-i|--install)\b'
    reason: Installs macOS system updates

  - pattern: '\binstaller\s+-pkg\b'
    reason: Installs macOS .pkg package

  - pattern: '\bkextload\b'
    reason: Loads kernel extension (arbitrary code in kernel space)

  - pattern: '\bmdutil\s+(-i\s+off|-E|-d)\b'
    reason: Disables or erases Spotlight index

  # ---------------------------------------------------------------------------
  # macOS PACKAGE MANAGERS
  # ---------------------------------------------------------------------------
  - pattern: '\bport\s+(uninstall|deactivate)\b'
    reason: port uninstall/deactivate (removes MacPorts package)

  - pattern: '\bport\s+(install|upgrade)\b'
    reason: port install/upgrade (MacPorts package mutation)

  # ---------------------------------------------------------------------------
  # ADDITIONAL SYSTEM STATE MUTATIONS
  # ---------------------------------------------------------------------------
  - pattern: '{sudo}launchctl{flags}(enable|disable|kickstart)\b'
    reason: launchctl enable/disable/kickstart changes service state

  - pattern: '\bcodesign{args}\s+(-s|--sign)\b'
    reason: codesign signs binaries (changes code signature trust)

  - pattern: '{sudo}tmutil\s+(addexclusion|removeexclusion|setdestination|enable)\b'
    reason: tmutil changes Time Machine backup configuration

  - pattern: '{sudo}profiles\s+(install|remove|renew)\b'
    reason: profiles installs or removes configuration profiles

  - pattern: '\bxattr\s+-w\b'
    reason: xattr -w writes extended attributes

# Git security patterns
bashToolPatterns:
  # ---------------------------------------------------------------------------
  # GIT CREDENTIAL EXPOSURE
  # ---------------------------------------------------------------------------
  - pattern: '\bgit{flags}credential\b'
    reason: git credential helper interaction (may expose stored credentials)

  # ---------------------------------------------------------------------------
  # GIT DESTRUCTIVE OPERATIONS (block)
  # ---------------------------------------------------------------------------
  - pattern: '\bgit{flags}reset\s+--hard\b'
    reason: git reset --hard (use --soft or stash)

  - pattern: '\bgit{flags}clean{args}\s+(-[a-eg-zA-Z]*f|-[a-eg-zA-Z]*d|--force)\b'
    reason: git clean with force/directory flags

  # Catches --force and -f but NOT --force-with-lease
  - pattern: '\bgit{flags}push\b{args}(\s--force(?!-with-lease)|\s-[a-eg-zA-Z]*f)\b'
    reason: git push --force (use --force-with-lease)

  - pattern: '\bgit{flags}stash\s+clear\b'
    reason: git stash clear (deletes ALL stashes)

  - pattern: '\bgit{flags}reflog\s+expire\b'
    reason: git reflog expire (destroys recovery mechanism)

  - pattern: '\bgit{flags}gc{args}\s+--prune=now'
    reason: git gc --prune=now (can lose dangling commits)

  - pattern: '\bgit{flags}filter-(branch|repo)\b'
    reason: git filter-branch/repo (rewrites entire history)

  - pattern: '\bgit{flags}(checkout|switch)\s+(-\S+\s+)*(-f|--force)\b'
    reason: git checkout/switch --force (silently discards uncommitted changes)

  - pattern: '\bgit{flags}submodule\s+deinit{args}\s+--force'
    reason: git submodule deinit --force (unregisters submodule)

  - pattern: '\bgit{flags}config\s+--system\b'
    reason: git config --system (modifies system-wide git configuration)

  - pattern: '\bgit{flags}update-ref\s+-d\b'
    reason: git update-ref -d (deletes refs, can break repository)

  # ---------------------------------------------------------------------------
  # GIT OPERATIONS REQUIRING CONFIRMATION
  # ---------------------------------------------------------------------------
  - pattern: '\bgit{flags}checkout\s+--\s*\.'
    reason: Discards all uncommitted changes

  - pattern: '\bgit{flags}restore\s+\.'
    reason: Discards all uncommitted changes

  - pattern: '\bgit{flags}stash\s+drop\b'
    reason: Permanently deletes a stash

  - pattern: '\bgit{flags}branch\s+(-\S+\s+)*-D'
    reason: Force deletes branch (even if unmerged)

  - pattern: '\bgit{flags}push\s+\S+\s+--delete\b'
    reason: Deletes remote branch

  - pattern: '\bgit{flags}push\s+\S+\s+:\S+'
    reason: Deletes remote branch (old syntax)

  - pattern: '\bgit{flags}revert\b'
    reason: Creates revert commit (undoes changes)

  - pattern: '\bgit{flags}tag\s+-d\b'
    reason: Deletes a local tag

  - pattern: '\bgit{flags}tag\s+(-\S+\s+)*-f\b'
    reason: Force moves an existing tag

  - pattern: '\bgit{flags}notes\s+(remove|prune)\b'
    reason: Removes git notes (metadata loss)

  - pattern: '\bgit{flags}config\s+--global\b'
    reason: Modifies global git configuration

  - pattern: '\bgit{flags}remote\s+(remove|rm)\b'
    reason: Removes a remote from repository

  - pattern: '\bgit{flags}remote\s+set-url\b'
    reason: Changes remote URL

  # ---------------------------------------------------------------------------
  # GIT OPERATIONS WITH REMOTE SIDE EFFECTS
  # ---------------------------------------------------------------------------
  - pattern: '\bgit{flags}push\b'
    reason: Pushes commits to remote repository

  - pattern: '\bgit{flags}fetch{args}\s+--prune\b'
    reason: Prunes remote-tracking branches

  # ---------------------------------------------------------------------------
  # GIT HISTORY / WORKFLOW OPERATIONS
  # ---------------------------------------------------------------------------
  - pattern: '\bgit{flags}rebase\b'
    reason: Rewrites commit history

  - pattern: '\bgit{flags}(cherry-pick|merge|rebase)\s+--abort\b'
    reason: Aborts in-progress operation (discards conflict resolution work)

  - pattern: '\bgit{flags}worktree\s+remove\b'
    reason: Removes git worktree

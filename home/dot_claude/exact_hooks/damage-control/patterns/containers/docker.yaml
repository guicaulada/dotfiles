# Docker, docker-compose, and Podman security patterns
bashToolPatterns:
  # ---------------------------------------------------------------------------
  # DOCKER / PODMAN DESTRUCTIVE OPERATIONS
  # ---------------------------------------------------------------------------
  - pattern: '\b(docker|podman){flags}system\s+prune{args}\s+-a'
    reason: system prune -a (removes all unused data)

  - pattern: '\b(docker|podman){flags}rm{args}\s+-f'
    reason: rm -f (force removes containers)

  - pattern: '\b(docker|podman){flags}rmi{args}\s+-f'
    reason: rmi -f (force removes images)

  - pattern: '\b(docker|podman){flags}(volume|network|container|image|builder|stack|service|secret|buildx|context|config|plugin|trust)\s+(rm|prune|revoke)\b'
    reason: destructive resource operation (rm/prune/revoke)

  - pattern: '\b(docker|podman){flags}image\s+prune{args}\s+-a'
    reason: image prune -a (removes all unused images)

  - pattern: '\b(docker|podman){flags}swarm\s+leave{args}\s+--force'
    reason: swarm leave --force (disrupts cluster)

  # ---------------------------------------------------------------------------
  # DOCKER-COMPOSE / DOCKER COMPOSE DESTRUCTIVE OPERATIONS
  # ---------------------------------------------------------------------------
  - pattern: '\bdocker[\s-]compose\s+down\s+.*(-v|--volumes)\b'
    reason: compose down with volumes (data loss)

  # ---------------------------------------------------------------------------
  # DOCKER / PODMAN OPERATIONS REQUIRING CONFIRMATION (ask: true)
  # ---------------------------------------------------------------------------
  - pattern: '\bdocker[\s-]compose\s+down\b'
    reason: Stops and removes containers
    ask: true

  - pattern: '\b(docker|podman){flags}run{args}\s+--privileged(?!=false)'
    reason: Runs container with full host access
    ask: true

  - pattern: '\b(docker|podman){flags}push\b'
    reason: Pushes image to registry
    ask: true

  - pattern: '\b(docker|podman){flags}manifest\s+push\b'
    reason: Pushes multi-arch manifest to registry
    ask: true

  # ---------------------------------------------------------------------------
  # HOST MOUNT (ask: true)
  # ---------------------------------------------------------------------------
  - pattern: '\b(docker|podman){flags}run{args}\s+(-v|--volume)\s+/:/\b'
    reason: Container run mounting host root filesystem
    ask: true

  - pattern: '\b(docker|podman){flags}run{args}\s+--mount\s+.*src=/[,\s]'
    reason: Container run mounting host root filesystem (--mount syntax)
    ask: true

  # ---------------------------------------------------------------------------
  # CONTAINER REGISTRY TOOLS
  # ---------------------------------------------------------------------------
  - pattern: '\b(skopeo|crane){flags}delete\b'
    reason: Deletes container image from registry

  - pattern: '\bcrane{flags}push\b'
    reason: Pushes image to registry
    ask: true

  - pattern: '\bcrane{flags}(copy|cp)\b'
    reason: Copies image between registries
    ask: true

  - pattern: '\bcrane{flags}tag\b'
    reason: Tags image in registry
    ask: true

  - pattern: '\bcrane{flags}append\b'
    reason: Appends layer to image and pushes to registry
    ask: true

  - pattern: '\bcrane{flags}mutate\b'
    reason: Mutates image and pushes to registry
    ask: true

  - pattern: '\bcrane{flags}flatten\b'
    reason: Flattens image layers and pushes to registry
    ask: true

  - pattern: '\bcrane{flags}rebase\b'
    reason: Rebases image and pushes to registry
    ask: true

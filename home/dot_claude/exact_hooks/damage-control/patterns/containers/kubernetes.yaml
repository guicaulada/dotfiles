# Kubernetes, Helm, and related orchestration security patterns
bashToolPatterns:
  # ---------------------------------------------------------------------------
  # KUBERNETES (kubectl) DESTRUCTIVE OPERATIONS
  # ---------------------------------------------------------------------------
  - pattern: '\bkubectl{flags}delete\s+(namespace|ns)\b'
    reason: kubectl delete namespace (destroys all resources in namespace)

  - pattern: '\bkubectl{flags}delete\s+(pv|persistentvolume|pvc|persistentvolumeclaim)\b'
    reason: kubectl delete persistent volume/claim (data loss)

  - pattern: '\bkubectl{flags}delete{args}\s+--all\b'
    reason: kubectl delete --all (bulk resource deletion)

  - pattern: '\bkubectl{flags}delete{args}\s+(-A|--all-namespaces)'
    reason: kubectl delete across all namespaces

  - pattern: '\bkubectl{flags}delete{args}\s+--force'
    reason: kubectl delete --force (bypasses graceful shutdown)

  - pattern: '\bkubectl{flags}config\s+(delete-(context|cluster|user)|unset)\b'
    reason: kubectl config delete/unset (modifies kubeconfig)

  - pattern: '\bkubectl{flags}drain{args}\s+--force'
    reason: kubectl drain --force (ignores PodDisruptionBudgets)

  - pattern: '\bkubectl{flags}drain{args}\s+--delete-emptydir-data'
    reason: kubectl drain --delete-emptydir-data (deletes local data)

  - pattern: '\bkubectl{flags}replace{args}\s+--force'
    reason: kubectl replace --force (deletes then recreates resource)

  # ---------------------------------------------------------------------------
  # HELM DESTRUCTIVE OPERATIONS
  # ---------------------------------------------------------------------------
  - pattern: '\bhelm{flags}(uninstall|delete)\b'
    reason: helm uninstall/delete (removes release)

  # ---------------------------------------------------------------------------
  # SERVICE MESH AND ORCHESTRATION
  # ---------------------------------------------------------------------------
  - pattern: '\bistioctl{flags}(uninstall|remove-from-cluster)\b'
    reason: istioctl uninstall (removes service mesh from cluster)

  - pattern: '\blinkerd{flags}uninstall\b'
    reason: linkerd uninstall (removes Linkerd service mesh)

  - pattern: '\bconsul{flags}(leave|force-leave)\b'
    reason: consul leave/force-leave (removes node from service mesh)

  - pattern: '\bconsul{flags}kv\s+delete\b'
    reason: consul kv delete (destroys key-value data)

  # ---------------------------------------------------------------------------
  # LOCAL KUBERNETES
  # ---------------------------------------------------------------------------
  - pattern: '\bkind{flags}delete\s+cluster\b'
    reason: kind delete cluster (destroys local Kubernetes cluster)

  - pattern: '\bminikube{flags}delete\b'
    reason: minikube delete (destroys local Kubernetes cluster)

  - pattern: '\bk3d{flags}cluster\s+delete\b'
    reason: k3d cluster delete (destroys local k3s cluster)

  # ---------------------------------------------------------------------------
  # NOMAD (HashiCorp) DESTRUCTIVE OPERATIONS
  # ---------------------------------------------------------------------------
  - pattern: '\bnomad{flags}job\s+stop\b'
    reason: nomad job stop (stops Nomad job)

  - pattern: '\bnomad{flags}namespace\s+delete\b'
    reason: nomad namespace delete (destroys Nomad namespace)

  - pattern: '\bnomad{flags}volume\s+delete\b'
    reason: nomad volume delete (destroys Nomad storage volume)

  # ---------------------------------------------------------------------------
  # KUBERNETES SECRET EXPOSURE
  # ---------------------------------------------------------------------------
  - pattern: '\bkubectl{flags}get\s+secrets?\b'
    reason: kubectl get secret (may expose decoded secret values)
    ask: true

  # ---------------------------------------------------------------------------
  # KUBERNETES (kubectl/helm) OPERATIONS REQUIRING CONFIRMATION (ask: true)
  # ---------------------------------------------------------------------------
  - pattern: '\bkubectl{flags}delete\b'
    reason: Deletes Kubernetes resources
    ask: true

  - pattern: '\bkubectl{flags}apply\b'
    reason: Creates or updates Kubernetes resources
    ask: true

  - pattern: '\bkubectl{flags}create\b'
    reason: Creates Kubernetes resources
    ask: true

  - pattern: '\bkubectl{flags}patch\b'
    reason: Modifies Kubernetes resources in-place
    ask: true

  - pattern: '\bkubectl{flags}replace\b'
    reason: Replaces Kubernetes resources
    ask: true

  - pattern: '\bkubectl{flags}scale\b'
    reason: Changes replica count
    ask: true

  - pattern: '\bkubectl{flags}rollout\s+(restart|undo)\b'
    reason: Restarts or rolls back deployment
    ask: true

  - pattern: '\bkubectl{flags}drain\b'
    reason: Evicts pods from node
    ask: true

  - pattern: '\bkubectl{flags}cordon\b'
    reason: Marks node as unschedulable
    ask: true

  - pattern: '\bkubectl{flags}uncordon\b'
    reason: Marks node as schedulable
    ask: true

  - pattern: '\bkubectl{flags}taint\b'
    reason: Modifies node taints
    ask: true

  - pattern: '\bkubectl{flags}exec\b'
    reason: Executes command in pod
    ask: true

  - pattern: '\bkubectl{flags}set\s+(image|env|resources)\b'
    reason: Modifies deployment configuration
    ask: true

  - pattern: '\bkubectl{flags}edit\b'
    reason: Edits Kubernetes resource in-place
    ask: true

  - pattern: '\bkubectl{flags}run\b'
    reason: Creates ad-hoc pod
    ask: true

  - pattern: '\bkubectl{flags}expose\b'
    reason: Creates Kubernetes service
    ask: true

  - pattern: '\bkubectl{flags}cp\b'
    reason: Copies files to/from pod
    ask: true

  - pattern: '\bkubectl{flags}label{args}\s+--overwrite'
    reason: Overwrites existing labels
    ask: true

  - pattern: '\bkubectl{flags}annotate{args}\s+--overwrite'
    reason: Overwrites existing annotations
    ask: true

  - pattern: '\bkubectl{flags}port-forward\b'
    reason: Forwards local port to pod
    ask: true

  - pattern: '\bkubectl{flags}config\s+(set-context|use-context)\b'
    reason: Changes active Kubernetes context
    ask: true

  - pattern: '\bkubectl{flags}config\s+set-credentials\b'
    reason: Modifies Kubernetes credentials
    ask: true

  - pattern: '\bkubectl{flags}debug\b'
    reason: Creates debug container in pod
    ask: true

  - pattern: '\bkubectl{flags}auth\s+reconcile\b'
    reason: Modifies Kubernetes RBAC rules
    ask: true

  - pattern: '\blinkerd{flags}inject\b'
    reason: Injects Linkerd sidecar proxy into resources
    ask: true

  - pattern: '\bhelm{flags}(install|upgrade)\b'
    reason: Deploys or updates Helm release
    ask: true

  - pattern: '\bhelm{flags}rollback\b'
    reason: Rolls back Helm release
    ask: true

  - pattern: '\bnomad{flags}job\s+run\b'
    reason: Submits Nomad job
    ask: true

# Package manager security patterns
# (registry, system, npm/yarn/pnpm, brew, pip, cargo, go, nix, snap, flatpak, asdf/mise/proto)
bashToolPatterns:
  # ---------------------------------------------------------------------------
  # CREDENTIAL / TOKEN EXPOSURE
  # ---------------------------------------------------------------------------
  - pattern: '\bnpm{flags}token\b'
    reason: npm token management (may expose authentication tokens)

  - pattern: '\bcomposer\s+config\b.*(http-basic|token|gitlab-token|github-oauth)\b'
    reason: Composer credential retrieval (may expose authentication tokens)

  - pattern: '\bgem{flags}credentials\b'
    reason: gem credentials (exposes RubyGems API key)

  # ---------------------------------------------------------------------------
  # PACKAGE REGISTRY DESTRUCTIVE OPERATIONS
  # ---------------------------------------------------------------------------
  - pattern: '\bnpm{flags}unpublish\b'
    reason: npm unpublish (removes package from registry)

  - pattern: '\bnpm{flags}deprecate\b'
    reason: npm deprecate (marks package as deprecated in registry)

  - pattern: '\bgem{flags}yank\b'
    reason: gem yank (removes gem from RubyGems)

  - pattern: '\bcargo{flags}yank\b'
    reason: cargo yank (yanks crate from crates.io)

  # ---------------------------------------------------------------------------
  # SYSTEM PACKAGE MANAGERS - REMOVAL (DESTRUCTIVE)
  # ---------------------------------------------------------------------------
  - pattern: '{sudo}\b(apt|apt-get){flags}(remove|purge|autoremove)\b'
    reason: apt package removal (system-level)

  - pattern: '{sudo}\b(dnf|yum){flags}(remove|erase|autoremove)\b'
    reason: dnf/yum package removal (system-level)

  - pattern: '{sudo}\bpacman{flags}-R'
    reason: pacman package removal (system-level)

  - pattern: '{sudo}\bzypper{flags}(remove|rm)\b'
    reason: zypper package removal (system-level)

  - pattern: '{sudo}\bapk{flags}del\b'
    reason: apk package removal (system-level)

  - pattern: '\b(snap\s+(remove|uninstall)|flatpak\s+uninstall)\b'
    reason: snap/flatpak package removal

  # ---------------------------------------------------------------------------
  # SYSTEM PACKAGE MANAGERS - INSTALLATION
  # ---------------------------------------------------------------------------
  - pattern: '{sudo}\b(apt|apt-get){flags}install\b'
    reason: apt package installation (system-level)

  - pattern: '{sudo}\b(dnf|yum){flags}install\b'
    reason: dnf/yum package installation (system-level)

  - pattern: '{sudo}\bpacman{flags}-S'
    reason: pacman package installation (system-level)

  - pattern: '{sudo}\bzypper{flags}(install|in)\b'
    reason: zypper package installation (system-level)

  - pattern: '{sudo}\bapk{flags}add\b'
    reason: apk package installation (system-level)

  # ---------------------------------------------------------------------------
  # HOMEBREW
  # ---------------------------------------------------------------------------
  - pattern: '\bbrew{flags}(uninstall|remove)\b'
    reason: Uninstalls Homebrew package

  - pattern: '\bbrew{flags}install{args}\s+--force'
    reason: Homebrew force install (overwrites existing)

  - pattern: '\bbrew{flags}reinstall\b'
    reason: Homebrew reinstall

  - pattern: '\bbrew{flags}install\s+--cask\b'
    reason: Homebrew cask install (macOS application)

  - pattern: '\bbrew{flags}(cleanup|autoremove)\b'
    reason: brew cleanup/autoremove (removes old versions or unused dependencies)

  # ---------------------------------------------------------------------------
  # PIP / GEM
  # ---------------------------------------------------------------------------
  - pattern: '\bpip3?\s+install\b'
    reason: pip install (arbitrary code execution from PyPI)

  - pattern: '\bpip\s+uninstall\b'
    reason: Uninstalls Python package

  - pattern: '\bgem{flags}uninstall\b'
    reason: Uninstalls Ruby gem

  # ---------------------------------------------------------------------------
  # CARGO / GO
  # ---------------------------------------------------------------------------
  - pattern: '\bcargo{flags}install\b'
    reason: cargo install (compiles and installs Rust binary)

  - pattern: '\bgo{flags}install\b'
    reason: go install (downloads and installs Go binary)

  # ---------------------------------------------------------------------------
  # NIX ECOSYSTEM
  # ---------------------------------------------------------------------------
  - pattern: '\b(nix-collect-garbage|nix-store\s+--delete|nix\s+store\s+(gc|delete))\b'
    reason: Nix garbage collection / store deletion (removes Nix store paths)

  - pattern: '\b(nix-env\s+(\S+\s+)*-e|nix\s+profile\s+(remove|install))\b'
    reason: Nix profile modification (install/remove packages)

  # ---------------------------------------------------------------------------
  # PACKAGE REGISTRY PUBLISHING
  # ---------------------------------------------------------------------------
  - pattern: '\bnpm{flags}publish\b'
    reason: Publishes package to npm registry

  # ---------------------------------------------------------------------------
  # NPM / YARN / PNPM / BUN - REMOTE EXECUTION
  # Trusted dev tools (defined in {trusted_npx} shorthand) are allowed through.
  # ---------------------------------------------------------------------------
  - pattern: '\b(npx|bunx|yarn\s+dlx|pnpm\s+dlx)\b(?!\s+(?:--?\S+\s+)*(?:{trusted_npx})\b)'
    reason: Downloads and executes arbitrary packages

  # ---------------------------------------------------------------------------
  # NPM / YARN / PNPM - GLOBAL INSTALLS
  # ---------------------------------------------------------------------------
  - pattern: '\bnpm{flags}(install|i)\s+(-\S+\s+)*-g\b'
    reason: npm global install (modifies system-wide packages)

  - pattern: '\byarn{flags}global\s+add\b'
    reason: yarn global install (modifies system-wide packages)

  - pattern: '\bpnpm{flags}add\s+(-\S+\s+)*-g\b'
    reason: pnpm global install (modifies system-wide packages)

  # ---------------------------------------------------------------------------
  # NPM / YARN - LINKING
  # ---------------------------------------------------------------------------
  - pattern: '\b(npm|yarn){flags}link\b'
    reason: npm/yarn link (creates global symlink)

  # ---------------------------------------------------------------------------
  # VERSION MANAGERS (asdf / mise / proto)
  # ---------------------------------------------------------------------------
  - pattern: '\basdf{flags}uninstall\b'
    reason: asdf uninstall (removes language/tool version)

  - pattern: '\bmise{flags}(uninstall|prune)\b'
    reason: mise uninstall/prune (removes tool versions)

  - pattern: '\bproto{flags}(uninstall|clean)\b'
    reason: proto uninstall/clean (removes tool versions)

  # ---------------------------------------------------------------------------
  # HOMEBREW STATE MUTATIONS (install, upgrade, taps, links, services)
  # ---------------------------------------------------------------------------
  - pattern: '{sudo}brew{flags}install\b'
    reason: Homebrew install (adds packages to the system)

  - pattern: '{sudo}brew{flags}(upgrade|update)\b'
    reason: Homebrew upgrade/update (mutates installed packages or formula metadata)

  - pattern: '{sudo}brew{flags}(tap|untap)\b'
    reason: brew tap changes which third-party repositories are trusted

  - pattern: '{sudo}brew{flags}(link|unlink|pin|unpin)\b'
    reason: brew link/pin changes which binaries resolve on PATH

  - pattern: '{sudo}brew{flags}services\b'
    reason: brew services manages launchd daemons

  - pattern: '{sudo}brew{flags}bundle\b'
    reason: brew bundle installs or removes everything in a Brewfile

  - pattern: '\bmas\s+(install|uninstall|upgrade|purchase|lucky)\b'
    reason: Mac App Store install/uninstall

  # ---------------------------------------------------------------------------
  # TOOLCHAIN SHIM MANAGERS (corepack, mise installs)
  # ---------------------------------------------------------------------------
  - pattern: '\bcorepack\s+(enable|disable|prepare|use|install|pack)\b'
    reason: corepack changes the active package-manager shims

  - pattern: '\bmise{flags}(install|use|upgrade|up|exec|run)\b'
    reason: mise installs or switches runtime versions

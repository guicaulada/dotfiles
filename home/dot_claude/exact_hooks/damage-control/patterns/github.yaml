# GitHub CLI (gh) security patterns
bashToolPatterns:
  # ---------------------------------------------------------------------------
  # GITHUB CLI CREDENTIAL EXPOSURE
  # ---------------------------------------------------------------------------
  - pattern: '\bgh{flags}auth\s+token\b'
    reason: gh auth token (exposes authentication token)

  - pattern: '\bgh{flags}auth\s+status\b{args}\s+(-t\b|--show-token)'
    reason: gh auth status --show-token (exposes authentication token)

  # ---------------------------------------------------------------------------
  # GITHUB CLI DESTRUCTIVE OPERATIONS
  # ---------------------------------------------------------------------------
  - pattern: '\bgh{flags}repo\s+(delete|archive|rename)\b'
    reason: gh repo delete/archive/rename (destructive repository operation)

  - pattern: '\bgh{flags}release\s+delete\b'
    reason: gh release delete (deletes a release)

  # ---------------------------------------------------------------------------
  # GITHUB CLI OPERATIONS REQUIRING CONFIRMATION
  # ---------------------------------------------------------------------------
  - pattern: '\bgh{flags}pr\s+(create|merge|close|reopen|review|comment|edit|ready)\b'
    reason: Mutating pull request operation

  - pattern: '\bgh{flags}issue\s+(create|close|reopen|comment|edit|transfer|pin|unpin)\b'
    reason: Mutating issue operation

  - pattern: '\bgh{flags}release\s+(create|edit)\b'
    reason: Mutating release operation

  - pattern: '\bgh{flags}repo\s+(create|fork|edit)\b'
    reason: Mutating repository operation

  - pattern: '\bgh{flags}label\s+(create|edit|delete)\b'
    reason: Mutating label operation

  - pattern: '\bgh{flags}api\b{args}\s+(-X|--method)\s+(POST|PUT|PATCH|DELETE)\b'
    reason: gh api with write method (mutating API call)

  - pattern: '\bgh{flags}api\b{args}\s+(-f|--field|-F|--raw-field)\b'
    reason: gh api with field flags (implies POST, mutating API call)

  - pattern: '\bgh{flags}api\b{args}\s+--input\b'
    reason: gh api with --input (implies POST, mutating API call)

  - pattern: '\bgh{flags}workflow\s+(enable|disable|run)\b'
    reason: Mutating GitHub Actions workflow operation

  - pattern: '\bgh{flags}run\s+(cancel|rerun|delete)\b'
    reason: Mutating GitHub Actions run operation

  - pattern: '\bgh{flags}secret\s+(set|delete)\b'
    reason: Manages repository secrets

  - pattern: '\bgh{flags}variable\s+(set|delete)\b'
    reason: Manages Actions variables

  - pattern: '\bgh{flags}gist\s+create\b'
    reason: Creates a gist (potential data exposure)
